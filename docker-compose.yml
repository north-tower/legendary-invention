version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sychar-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
      POSTGRES_DB: ${POSTGRES_DB:-sychar_db}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sychar-backend
    restart: always
    ports:
      - "6901:6901"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres_password}@db:5432/${POSTGRES_DB:-sychar_db}?sslmode=disable
      PORT: 6901
      FRONTEND_URL: ${FRONTEND_URL:-http://51.11.182.211:7000}
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_jwt_key}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your_super_secret_refresh_key}
      MPESA_ENV: sandbox
      # Add other necessary env vars here
    depends_on:
      - db

volumes:
  postgres_data:
